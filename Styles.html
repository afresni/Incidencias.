<style>
  :root {
    --bg: #f6f7fb;
    --surface: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #d1d5db;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success-bg: #ecfdf3;
    --success-text: #166534;
    --warn-bg: #fff7ed;
    --warn-text: #9a3412;
    --error-bg: #fef2f2;
    --error-text: #991b1b;
    --radius: 10px;
    --space-1: 8px;
    --space-2: 12px;
    --space-3: 16px;
    --space-4: 24px;
    --shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
  }

  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: var(--space-3) var(--space-4);
    box-shadow: var(--shadow);
  }

  .app-title {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }

  .app-main {
    max-width: 1000px;
    margin: var(--space-4) auto;
    padding: 0 var(--space-3) var(--space-4);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-3);
    margin-bottom: var(--space-3);
    box-shadow: var(--shadow);
  }

  .section-title {
    margin: 0 0 var(--space-2) 0;
    font-size: 1rem;
    font-weight: 700;
  }

  .muted {
    color: var(--muted);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-2);
    margin-bottom: var(--space-2);
  }

  @media (min-width: 768px) {
    .row.cols-2 {
      grid-template-columns: 1fr 1fr;
    }
    .row.cols-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }
  }

  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="email"],
  input[type="url"],
  input[type="search"],
  select,
  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font: inherit;
    color: var(--text);
    background: #fff;
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .actions {
    display: flex;
    gap: var(--space-2);
    flex-wrap: wrap;
    margin-top: var(--space-2);
  }

  button,
  .btn {
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 10px 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
  }

  button:hover,
  .btn:hover {
    background: var(--primary-hover);
  }

  button:disabled,
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: #fff;
    color: var(--text);
    border-color: var(--border);
  }

  .btn-secondary:hover {
    background: #f3f4f6;
  }

  .list,
  .table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table th,
  .table td {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    vertical-align: top;
    font-size: 0.95rem;
  }

  .table th {
    background: #f9fafb;
    font-weight: 700;
  }

  .table tr:last-child td {
    border-bottom: none;
  }

  .status {
    display: inline-block;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 0.8rem;
    font-weight: 700;
    border: 1px solid var(--border);
    background: #f3f4f6;
    color: var(--text);
  }

  .status.success {
    background: var(--success-bg);
    color: var(--success-text);
    border-color: #86efac;
  }

  .status.warn {
    background: var(--warn-bg);
    color: var(--warn-text);
    border-color: #fdba74;
  }

  .status.error {
    background: var(--error-bg);
    color: var(--error-text);
    border-color: #fca5a5;
  }

  .message {
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: var(--space-2);
    border: 1px solid var(--border);
    background: #f9fafb;
  }

  .message.success {
    background: var(--success-bg);
    color: var(--success-text);
    border-color: #86efac;
  }

  .message.warn {
    background: var(--warn-bg);
    color: var(--warn-text);
    border-color: #fdba74;
  }

  .message.error {
    background: var(--error-bg);
    color: var(--error-text);
    border-color: #fca5a5;
  }

  .hidden {
    display: none !important;
  }
</style>
